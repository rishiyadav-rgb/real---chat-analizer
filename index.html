<!DOCTYPE html>
<html>
<head>
<title>Chat App</title>

<style>
body {
    font-family: Arial;
    background: #ece5dd;
    display: flex;
    justify-content: center;
}

.chat {
    width: 400px;
    height: 90vh;
    background: white;
    display: flex;
    flex-direction: column;
}

#messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    margin: 5px;
    padding: 8px;
    border-radius: 10px;
    max-width: 70%;
}

.me {
    background: #dcf8c6;
    margin-left: auto;
}

.other {
    background: #f1f1f1;
}

.input {
    display: flex;
}

input {
    flex: 1;
    padding: 10px;
}

button {
    padding: 10px;
    background: green;
    color: white;
    border: none;
}
</style>

</head>
<body>

<div class="chat">
    <div id="messages"></div>

    <div class="input">
        <input id="name" placeholder="Name">
        <input id="msg" placeholder="Message">
        <button onclick="send()">Send</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const messages = document.getElementById("messages");

function add(msg, me) {
    const div = document.createElement("div");
    div.className = "msg " + (me ? "me" : "other");
    div.innerText = msg.name + ": " + msg.text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

socket.on("chat history", data => {
    data.forEach(m => add(m, false));
});

socket.on("message", data => {
    add(data, false);
});

function send() {
    const name = document.getElementById("name").value || "User";
    const text = document.getElementById("msg").value;

    if (!text) return;

    const msg = { name, text };

    socket.emit("message", msg);
    add(msg, true);

    document.getElementById("msg").value = "";
}

// ENTER KEY SUPPORT
document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
